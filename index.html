<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Busca de Termos</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <aside>
    <div class="branding">
      <span class="material-symbols-outlined">
        emoji_nature
      </span>
      <h1>Busca de Termos</h1>
    </div>
    <nav>
      <a href="#">
        <span class="material-symbols-outlined">
          search
        </span>
        <span>Buscar de Termos</span>
      </a>
      <a href="#">
        <span class="material-symbols-outlined">
          add
        </span>
        <span>Adicionar Termos</span>
      </a>
    </nav>
  </aside>
  <main>
    <h2>Buscar de Termos</h2>
    <div class="search-bar">
      <input type="text" placeholder="Digite o termo que deseja buscar...">
      <button type="submit">
        <span class="material-symbols-outlined">
          search
        </span>
        Buscar
      </button>
    </div>
    <table border="1">
      <thead>
        <tr>
          <th>Termo</th>
          <th>Sigla</th>
          <th>Definição</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Exemplo de Termo</td>
          <td>ET</td>
          <td>Esta é uma definição de exemplo para o termo.</td>
          <td>
            <button type="button" class="material-symbols-outlined">
              edit
            </button>
            <button type="button" class="material-symbols-outlined">
              delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <script>
      const el = document.querySelector('tbody tr');
      let i = 100
      while (i--)
        el.insertAdjacentHTML('afterend', el.outerHTML);
    </script>
  </main>
</body>
</html>
